services:
  postgres:
    image: postgres:16-alpine
    container_name: rhythm_postgres
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
      POSTGRES_DB: rhythm_dev
    ports:
      - "5432:5432"
    volumes:
      - rhythm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d rhythm_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  rhythm_pg_data:
